<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login Rive</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>®️</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/alertify.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/themes/default.min.css" />
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="rive-stage">
        <canvas id="rive-canvas"></canvas>
      </div>
    </div>
    <div class="right">
      <div class="right-inner">
        <div class="logo">
          <img src="./resources/rive_logo_black.svg" alt="Rive" class="logo-image" />
        </div>
        <h1>Log in</h1>

        <div class="login-box">
          <button type="button" class="btn-google">
            <img src="./resources/signin-google.png" alt="Google" class="google-icon" />
            <span>Continue with Google</span>
          </button>
          <div class="divider"><span>or</span></div>
          <input placeholder="email or username" id="email" maxlength="35" />
          <input placeholder="password" id="password" type="password" maxlength="25" />
          <button id="btnLogin" type="button" class="btn-primary">Log in</button>
          <div class="test-actions">
            <button id="btnTestError" type="button" class="btn-secondary">Probar error</button>
            <button id="btnTestSuccess" type="button" class="btn-secondary">Probar success</button>
          </div>
          <p class="hint">Forgot password? · Use single sign-on</p>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/rive.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/alertify.min.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
